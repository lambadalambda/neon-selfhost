name: neon-selfhost

services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    image: neon-selfhost/controller:dev
    user: "0:0"
    environment:
      HTTP_HOST: 0.0.0.0
      PORT: "8080"
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:?set BASIC_AUTH_PASSWORD before running docker compose}
      CONTROLLER_DATA_DIR: /var/lib/neon/controller
      COMPUTE_DATA_DIR: /var/lib/neon/compute
      PRIMARY_ENDPOINT_MODE: docker
      PRIMARY_ENDPOINT_SERVICE: compute
      PRIMARY_ENDPOINT_HOST: 127.0.0.1
      PRIMARY_ENDPOINT_PORT: "55433"
      PRIMARY_ENDPOINT_DATABASE: postgres
      PRIMARY_ENDPOINT_USER: cloud_admin
      PRIMARY_ENDPOINT_PASSWORD: cloud_admin
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      DOCKER_COMPOSE_PROJECT: neon-selfhost
      PAGESERVER_API: http://pageserver:9898
      PAGESERVER_PG_VERSION: "16"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - controller_state:/var/lib/neon/controller
      - compute_state:/var/lib/neon/compute
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - neon_internal

  storage_broker:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - storage_broker
      - --listen-addr=0.0.0.0:50051
    networks:
      - neon_internal

  pageserver:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    volumes:
      - pageserver_data:/data
      - ./configs/neon/pageserver/identity.toml:/data/.neon/identity.toml:ro
      - ./configs/neon/pageserver/pageserver.toml:/data/.neon/pageserver.toml:ro
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper1:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper1:5454
      - --listen-http=0.0.0.0:7676
      - --id=1
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper1_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper2:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper2:5454
      - --listen-http=0.0.0.0:7676
      - --id=2
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper2_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper3:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper3:5454
      - --listen-http=0.0.0.0:7676
      - --id=3
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper3_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  compute:
    build:
      context: ./configs/neon/compute_wrapper
      dockerfile: Dockerfile
      args:
        REPOSITORY: ${NEON_REPOSITORY:-ghcr.io/neondatabase}
        COMPUTE_IMAGE: ${NEON_COMPUTE_IMAGE:-compute-node-v16}
        TAG: ${NEON_COMPUTE_TAG:-latest}
    image: ${NEON_COMPUTE_WRAPPER_IMAGE:-neon-selfhost/compute:dev}
    profiles: ["neon"]
    environment:
      PG_VERSION: ${PG_VERSION:-16}
      TENANT_ID: ${TENANT_ID:-}
      TIMELINE_ID: ${TIMELINE_ID:-}
    volumes:
      - compute_state:/var/lib/neon/compute
      - ./configs/neon/compute_wrapper/var/db/postgres/configs:/var/db/postgres/configs:ro
      - ./configs/neon/compute_wrapper/shell:/shell:ro
    entrypoint:
      - /shell/compute.sh
    ports:
      - "127.0.0.1:55433:55433"
    depends_on:
      - pageserver
      - safekeeper1
      - safekeeper2
      - safekeeper3
    networks:
      - neon_internal

volumes:
  controller_state:
  compute_state:
  pageserver_data:
  safekeeper1_data:
  safekeeper2_data:
  safekeeper3_data:

networks:
  neon_internal:
    driver: bridge

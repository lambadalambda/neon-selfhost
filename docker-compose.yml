name: neon-selfhost

services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    image: neon-selfhost/controller:dev
    environment:
      HTTP_HOST: 0.0.0.0
      PORT: "8080"
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:?set BASIC_AUTH_PASSWORD before running docker compose}
      CONTROLLER_DATA_DIR: /var/lib/neon/controller
      COMPUTE_DATA_DIR: /var/lib/neon/compute
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - controller_state:/var/lib/neon/controller
      - compute_state:/var/lib/neon/compute
    networks:
      - neon_internal

  storage_broker:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - storage_broker
      - --listen-addr=0.0.0.0:50051
    networks:
      - neon_internal

  pageserver:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    volumes:
      - pageserver_data:/data
      - ./configs/neon/pageserver:/data/.neon:ro
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper1:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper1:5454
      - --listen-http=0.0.0.0:7676
      - --id=1
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper1_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper2:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper2:5454
      - --listen-http=0.0.0.0:7676
      - --id=2
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper2_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

  safekeeper3:
    image: ${NEON_IMAGE:-ghcr.io/neondatabase/neon:latest}
    profiles: ["neon"]
    command:
      - safekeeper
      - --listen-pg=safekeeper3:5454
      - --listen-http=0.0.0.0:7676
      - --id=3
      - --broker-endpoint=http://storage_broker:50051
      - -D
      - /data
    volumes:
      - safekeeper3_data:/data
    depends_on:
      - storage_broker
    networks:
      - neon_internal

volumes:
  controller_state:
  compute_state:
  pageserver_data:
  safekeeper1_data:
  safekeeper2_data:
  safekeeper3_data:

networks:
  neon_internal:
    driver: bridge

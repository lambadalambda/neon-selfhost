[tools]
go = "1.25.7"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks."stack:up"]
description = "Start controller + Neon stack"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" docker compose --profile neon up -d --build'

[tasks."stack:down"]
description = "Stop controller + Neon stack"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" docker compose --profile neon down'

[tasks."stack:ps"]
description = "Show stack container status"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" docker compose --profile neon ps -a'

[tasks."stack:logs"]
description = "Show recent stack logs"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" docker compose --profile neon logs --no-color --tail=200'

[tasks.smoke]
description = "Run API smoke test against active stack"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" ./scripts/smoke.sh'

[tasks."smoke:fresh"]
description = "Run smoke test with managed stack lifecycle"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" ./scripts/smoke.sh --manage-stack'

[tasks."db:reset-seed"]
description = "Reset and seed branch test dataset on main"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" ./scripts/reset_seed_data.sh --seed-only'

[tasks."db:verify"]
description = "Reset, seed, and verify branch isolation"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" ./scripts/reset_seed_data.sh'

[tasks."db:verify:fresh"]
description = "Reset/seed/verify with managed stack lifecycle"
run = 'BASIC_AUTH_PASSWORD="${BASIC_AUTH_PASSWORD:-change-me}" ./scripts/reset_seed_data.sh --manage-stack'

[tasks."db:backup"]
description = "Backup controller SQLite database"
run = 'CONTROLLER_DATA_DIR="${CONTROLLER_DATA_DIR:-.data/controller}"; mkdir -p "$CONTROLLER_DATA_DIR"; sqlite3 "$CONTROLLER_DATA_DIR/controller.db" ".backup ''$CONTROLLER_DATA_DIR/controller-backup-$(date +%Y%m%d-%H%M%S).db''"'

[tasks."db:restore"]
description = "Restore controller SQLite database from BACKUP_FILE"
run = 'test -n "${BACKUP_FILE:-}" || { echo "set BACKUP_FILE=/path/to/controller-backup.db"; exit 1; }; CONTROLLER_DATA_DIR="${CONTROLLER_DATA_DIR:-.data/controller}"; mkdir -p "$CONTROLLER_DATA_DIR"; sqlite3 "$CONTROLLER_DATA_DIR/controller.db" ".restore ''${BACKUP_FILE}''"'
